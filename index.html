<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
	<script src="renju_logic.js"></script>
    <title>오목고고혓 - 룰 선택 버전</title>
    <style>
        body { text-align: center; background-color: #f0f0f0; font-family: sans-serif; }
        canvas {
            background-color: #e3a05b;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            cursor: default; margin-top: 20px;
            pointer-events: none;
        }
        .menu { margin: 20px; padding: 20px; background: white; display: inline-block; border-radius: 10px; border: 2px solid #ccc; }
        .rule-selection { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button:hover { background-color: #ddd; }
        #status { font-size: 20px; font-weight: bold; margin: 10px; color: #333; }
        label { font-size: 16px; cursor: pointer; margin: 0 10px; }
    </style>
</head>
<body>

    <h1>오목 게임</h1>

    <div id="start-menu" class="menu">
        <div class="rule-selection">
            <p><strong>규칙 선택</strong></p>
            <label><input type="radio" name="rule" value="free" checked> 자유룰</label>
            <label><input type="radio" name="rule" value="renju"> 렌주룰 (첫 수 중앙)</label>
        </div>
        <p><strong>돌 선택</strong></p>
        <button onclick="startGame('black')">흑돌 (선공)</button>
        <button onclick="startGame('white')">백돌 (후공)</button>
        <button onclick="startGame('random')">랜덤 선택</button>
    </div>

    <div id="status">규칙과 돌을 선택하고 게임을 시작하세요!</div>
    <canvas id="omokCanvas" width="450" height="450"></canvas>
    <br>
    <button onclick="location.reload()">새로고침 (다시 시작)</button>

    <script>
        const canvas = document.getElementById('omokCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const size = 15;
        const step = 30;
        const center = 7; 
        let board = Array.from(Array(size), () => Array(size).fill(0));
        let userColor = 1; 
        let currentTurn = 1; 
        let gameOver = false;
        let selectedRule = 'free'; // 'free' 또는 'renju'

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = "#000";
            for (let i = 0; i < size; i++) {
                ctx.moveTo(15 + i * step, 15); ctx.lineTo(15 + i * step, 435);
                ctx.moveTo(15, 15 + i * step); ctx.lineTo(435, 15 + i * step);
            }
            ctx.stroke();
            
            // 중앙점(천원) 표시
            ctx.beginPath();
            ctx.arc(15 + center * step, 15 + center * step, 3, 0, 2 * Math.PI);
            ctx.fill();
        }

        function startGame(choice) {
            // 규칙 확인
            selectedRule = document.querySelector('input[name="rule"]:checked').value;
            
            board = Array.from(Array(size), () => Array(size).fill(0));
            gameOver = false;
            currentTurn = 1;

            if (choice === 'black') userColor = 1;
            else if (choice === 'white') userColor = 2;
            else userColor = Math.random() < 0.5 ? 1 : 2;

            document.getElementById('start-menu').style.display = 'none';
            canvas.style.pointerEvents = 'auto';
            drawBoard();
            
            if (selectedRule === 'renju') {
                // [렌주룰] 첫 수는 무조건 중앙
                placeStone(center, center, 1);
                currentTurn = 2;
                if (userColor === 1) {
                    statusText.innerText = "렌주룰: 흑돌이 중앙에 놓였습니다. AI(백돌) 차례입니다.";
                    setTimeout(aiTurn, 500);
                } else {
                    statusText.innerText = "렌주룰: AI(흑돌)가 중앙에 두었습니다. 당신(백돌) 차례입니다.";
                }
            } else {
                // [자유룰] 아무것도 놓지 않고 시작
                statusText.innerText = (userColor === 1 ? "자유룰: 당신(흑돌) 차례입니다." : "자유룰: AI(흑돌)가 생각 중입니다.");
                if (userColor === 2) setTimeout(aiTurn, 500);
            }
        }

		canvas.onclick = function(e) {
			if (gameOver || currentTurn !== userColor) return;

			let x = Math.round((e.offsetX - 15) / step);
			let y = Math.round((e.offsetY - 15) / step);

			if (x >= 0 && x < size && y >= 0 && y < size && board[y][x] === 0) {
				
				// 외부 라이브러리 사용: 렌주룰일 때 흑돌 금수 체크
				if (selectedRule === 'renju' && userColor === 1) {
					let forbiddenType = Renju.checkForbidden(board, x, y, 1);
					if (forbiddenType > 0) {
						const messages = ["", "3-3 금수입니다!", "4-4 금수입니다!", "장륙(6목) 금수입니다!"];
						alert(messages[forbiddenType]);
						return;
					}
				}

				placeStone(x, y, userColor);
				// ... 후략
			}
		};

        function placeStone(x, y, color) {
            board[y][x] = color;
            ctx.beginPath();
            ctx.arc(15 + x * step, 15 + y * step, 13, 0, 2 * Math.PI);
            ctx.fillStyle = color === 1 ? "black" : "white";
            ctx.fill();
            
            if (checkWin(x, y, color)) {
                statusText.innerText = (color === 1 ? "흑돌" : "백돌") + " 승리!!!";
                gameOver = true;
                setTimeout(() => alert((color === 1 ? "흑돌" : "백돌") + "이 승리했습니다!"), 100);
            }
        }

        function aiTurn() {
            if (gameOver) return;
            let emptySpots = [];
            for(let y=0; y<size; y++) {
                for(let x=0; x<size; x++) {
                    if(board[y][x] === 0) emptySpots.push({x, y});
                }
            }
            if (emptySpots.length > 0) {
                let spot = emptySpots[Math.floor(Math.random() * emptySpots.length)];
                let aiColor = (userColor === 1 ? 2 : 1);
                placeStone(spot.x, spot.y, aiColor);
                if (!gameOver) {
                    currentTurn = userColor;
                    statusText.innerText = "당신의 차례입니다.";
                }
            }
        }

        function checkWin(x, y, color) {
            const directions = [[1,0], [0,1], [1,1], [1,-1]];
            for (let [dx, dy] of directions) {
                let count = 1;
                for (let i = 1; i < 5; i++) {
                    let nx = x + dx * i, ny = y + dy * i;
                    if (nx >= 0 && nx < size && ny >= 0 && ny < size && board[ny][nx] === color) count++;
                    else break;
                }
                for (let i = 1; i < 5; i++) {
                    let nx = x - dx * i, ny = y - dy * i;
                    if (nx >= 0 && nx < size && ny >= 0 && ny < size && board[ny][nx] === color) count++;
                    else break;
                }
                if (count >= 5) return true;
            }
            return false;
        }
    </script>
</body>
</html>
